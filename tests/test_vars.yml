---

container_default_basedir: "."

containers:
  mycontainer:
    hosts: ["all"]
    name: "mytestcontainer"
    image: "drpsychick/dnsmasq"
    directory: "dnsmasq"
    pull: true
    create: true
  mybuild:
    hosts: ["all"]
    name: "mybuildtest"
    image: "mybuildtest"
    directory: "mybuildtest"
    build: true
    cleanup: true
    files:
      dockerfile: { name: "Dockerfile", mode: "0644" }
      testdir: { name: "directory/testfile.md", mode: "0644" }
